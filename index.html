            pointer-events: none;

            height: 100%;
            overflow: hidden;

            background: #e8e2d6;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;

            { id: 70, type: "108 自在語", title: "超越老病", text: "超越生老病苦三原則：活得快樂、病得健康、老得有希望。" },
            { id: 71, type: "108 自在語", title: "超越死亡", text: "超越死亡三原則：不要尋死、不要怕死、不要等死。" },
            { id: 72, type: "108 自在語", title: "莊嚴佛事", text: "死亡不是喜事，也不是喪事，而是一件莊嚴的佛事。" },

            { id: 74, type: "108 自在語", title: "青少年教育", text: "對青少年，要關心不要擔心，要誘導不要控制，用商量不用權威。" },
            { id: 75, type: "108 自在語", title: "愛與祝福", text: "愛你的孩子，與其擔心，不如祝福吧。" },
            { id: 76, type: "108 自在語", title: "夫妻關係", text: "夫妻是倫理的關係，不是「論理」的關係。" },
            { id: 77, type: "108 自在語", title: "因果觀", text: "現在所得的，是過去所造的，未來所得的，是現在所做的。" },
            { id: 78, type: "108 自在語", title: "眼光運氣", text: "眼光，是你的智慧；運氣，是你的福德。" },
            { id: 79, type: "108 自在語", title: "煩惱來源", text: "喜愛的就想佔有，討厭的就會排斥，患得患失，煩惱就來了。" },
            { id: 80, type: "108 自在語", title: "少欲知足", text: "經常少欲知足的人，才是無虞匱乏的富人。" },
            { id: 81, type: "108 自在語", title: "心平安", text: "心不平安是真正的苦，身體的病痛不一定是苦。" },
            { id: 82, type: "108 自在語", title: "持念觀音", text: "明知心不平安是苦事，就趕快以持念「南無觀世音菩薩」來安心吧。" },
            { id: 83, type: "108 自在語", title: "擁有最好", text: "現在擁有的，就是最好的. 擁有再多也無法滿足，就等於是窮人。" },
            { id: 84, type: "108 自在語", title: "化解情緒", text: "不要用壓抑來控制情緒，最好用觀想、用佛號、用祈禱，來化解情緒。" },
            { id: 85, type: "108 自在語", title: "三好運", text: "好話大家說，好事大家做，好運大家轉。" },
            { id: 88, type: "108 自在語", title: "我來吧", text: "急須要做，正要人做的事，我來吧。" },
            { id: 89, type: "108 自在語", title: "心口和", text: "我和人和，心和口和，歡歡喜喜有幸福。" },
            { id: 91, type: "108 自在語", title: "自求心安", text: "自求心安就有平安，關懷他人就有幸福。" },
            { id: 93, type: "108 自在語", title: "奉獻修行", text: "奉獻即是修行，安心即是成就。" },
            { id: 97, type: "108 自在語", title: "人際相處", text: "若希望人際關係相處得好，就要把心量放大，多接納人，多包容人。" },
            { id: 98, type: "108 自在語", title: "心態改變", text: "只要自己的心態改變，環境也會跟著改變，世界上沒有絕對的好與壞。" },
            { id: 102, type: "108 自在語", title: "戒貪方法", text: "戒貪最好的方法，就是多布施、多奉獻、多與人分享。" },
            { id: 106, type: "108 自在語", title: "消融煩惱", text: "煩惱消歸自心就有智慧，利益分享他人便是慈悲。" },
            { id: 107, type: "108 自在語", title: "看世界", text: "用慚愧心看自己，用感恩心看世界。" },
            { id: 108, type: "108 自在語", title: "淨化人心", text: "淨化人心，少欲知足，淨化社會，關懷他人。" }
        ];

        const colors = ["#fdfcf0", "#f0f4fd", "#fdf0f0", "#f0fdf4", "#fdf6f0"];
        let collectedFortunes = JSON.parse(localStorage.getItem('zenQuotesFull')) || [];
        let isMusicPlaying = false;
        let stickersData = [];

        const wall = document.getElementById('wall');
        const bgm = document.getElementById('bgm');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContainer = document.getElementById('modalContainer');

        function initWall() {
            wall.innerHTML = '';
            stickersData = [];
            const count = 65; 

            for (let i = 0; i < count; i++) {
                const qData = masterQuotes[Math.floor(Math.random() * masterQuotes.length)];
                const el = document.createElement('div');
                el.className = 'sticker sticker-torn';
                
                const x = Math.random() * (window.innerWidth - 130);
                const y = Math.random() * (window.innerHeight - 190);
                const r = Math.random() * 60 - 30;
                
                el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = '130px';
                el.style.height = '190px';
                el.style.zIndex = Math.floor(Math.random() * 20);

                el.innerHTML = `
                    <div class="sticker-back">
                        <img src="${BACK_IMAGE_URL}" alt="back">
                    </div>
                `;
                
                wall.appendChild(el);
                stickersData.push({
                    el: el, data: qData, x: x, y: y, baseX: x, baseY: y,
                    rotation: r, vx: 0, vy: 0
                });
            }
            updateStickersPosition();
        }

        let mouseX = -1000; let mouseY = -1000;
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        function updateStickersPosition() {
            stickersData.forEach(s => {
                const dx = mouseX - (s.x + 65);
                const dy = mouseY - (s.y + 95);
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 200) {
                    const angle = Math.atan2(dy, dx);
                    const force = (200 - distance) / 200;
                    s.vx -= Math.cos(angle) * force * 8;
                    s.vy -= Math.sin(angle) * force * 8;
                }
                s.vx += (s.baseX - s.x) * 0.05;
                s.vy += (s.baseY - s.y) * 0.05;
                s.vx *= 0.85; s.vy *= 0.85;
                s.x += s.vx; s.y += s.vy;
                s.el.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${s.rotation + (s.vx * 1.2)}deg)`;
            });
            requestAnimationFrame(updateStickersPosition);
        }

        function closeModal() {
            modalContainer.classList.remove('active');
            setTimeout(() => modalOverlay.style.display = 'none', 400);
        }

        async function runDrawAnimation() {
            const btn = document.getElementById('drawBtn');
            btn.disabled = true;
            btn.innerText = "誠心感應中...";

            const target = stickersData[Math.floor(Math.random() * stickersData.length)];
            target.el.classList.add('picked');

            await new Promise(r => setTimeout(r, 1000));
            showQuote(target.data, true);
            
            setTimeout(() => {
                target.el.classList.remove('picked');
                btn.disabled = false;
                btn.innerText = "恭請自在語";
            }, 1000);
        }

        function showQuote(q, isNew) {
            document.getElementById('mType').innerText = q.type;
            document.getElementById('mTitle').innerText = q.title;
            document.getElementById('mText').innerText = q.text;
            
            const cardImg = document.getElementById('cardIllustration');
            
            // 重要：先設定 Source，如果載入失敗會觸發破圖圖示，讓你一眼看出路徑哪裡寫錯
            cardImg.src = getIllustrationUrl(q.id);

            modalOverlay.style.display = 'flex';
            setTimeout(() => modalContainer.classList.add('active'), 50);

            if (isNew) {
                if (!collectedFortunes.find(item => item.id === q.id)) {
                    collectedFortunes.unshift({ ...q, date: new Date().toLocaleDateString() });
                    localStorage.setItem('zenQuotesFull', JSON.stringify(collectedFortunes));
                    updateCollectionUI();
                }
            }
        }

        function updateCollectionUI() {
            const list = document.getElementById('collectionList');
            list.innerHTML = collectedFortunes.length === 0 
                ? `<p class="text-gray-400 text-sm text-center mt-20 italic">誠心感念，法語自來。</p>`
                : collectedFortunes.map(q => `
                    <div class="flex items-center gap-4 p-4 border-b border-amber-50 cursor-pointer hover:bg-amber-50/50 transition-colors" onclick='showQuote(${JSON.stringify(q)}, false)'>
                        <div class="w-12 h-12 bg-amber-50 rounded flex items-center justify-center text-amber-800 font-bold text-xs shrink-0">禪</div>
                        <div class="overflow-hidden">
                            <div class="text-amber-900 font-bold text-sm truncate">${q.title}</div>
                            <div class="text-[10px] text-gray-400 mt-1">${q.date} · ${q.type}</div>
                        </div>
                    </div>
                `).join('');
        }

        document.getElementById('closeModal').onclick = closeModal;
        document.getElementById('closeX').onclick = closeModal;
        modalOverlay.onclick = function(e) { if (e.target === modalOverlay) closeModal(); };
        modalContainer.onclick = function(e) { e.stopPropagation(); };

        document.getElementById('drawBtn').onclick = runDrawAnimation;
        document.getElementById('musicBtn').onclick = function() {
            if (isMusicPlaying) { bgm.pause(); this.innerText = '🔇'; }
            else { bgm.play().catch(e => {}); this.innerText = '🎵'; }
            isMusicPlaying = !isMusicPlaying;
        };
        document.getElementById('folderBtn').onclick = () => document.getElementById('collectionPanel').classList.add('open');
        document.getElementById('closeFolder').onclick = () => document.getElementById('collectionPanel').classList.remove('open');

        document.getElementById('downloadBtn').onclick = (e) => {
            e.stopPropagation();
            html2canvas(document.getElementById('captureArea'), { 
                backgroundColor: '#f2ede4', 
                scale: 2, 
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `聖嚴法師自在語-${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        };

        window.onresize = initWall;
        initWall();
        updateCollectionUI();
    </script>
</body>
</html>
